name: Firebase deploy

# CI/CD das Firestore rules/indexes + Cloud Functions. (B2)
#
# Estratégia: VALIDA em cada push/PR (sem segredos); só faz DEPLOY para produção
# depois de aprovação manual (GitHub Environment "production"). O frontend (HTML)
# é servido pelo GitHub Pages e NÃO é tocado por este workflow.
#
# ─── Setup necessário (uma vez), do lado do repositório/GCP ───────────────────
# 1. Service account de CI (least privilege) com os papéis para deploy:
#      - Firebase Rules Admin            (roles/firebaserules.admin)
#      - Cloud Datastore Index Admin     (roles/datastore.indexAdmin)
#      - Cloud Functions Admin           (roles/cloudfunctions.admin)
#      - Service Account User            (roles/iam.serviceAccountUser)
#      - Cloud Build Editor              (roles/cloudbuild.builds.editor)
#      - Artifact Registry Writer        (roles/artifactregistry.writer)
#      - Secret Manager Secret Accessor  (roles/secretmanager.secretAccessor)
#    Gera uma chave JSON dessa SA e confirma no IAM do projeto que ela tem
#    TODOS estes papéis — um deploy que falha com "Failed to authenticate,
#    have you run firebase login?" mesmo com credenciais ADC válidas pode ser
#    esta lista incompleta, não só o bug do firebase-tools (issue #10716).
# 2. GitHub → Settings → Secrets and variables → Actions → New secret:
#      FIREBASE_SERVICE_ACCOUNT = (conteúdo do JSON da SA)
# 3. GitHub → Settings → Environments → New environment "production" →
#    "Required reviewers" = tu. (É isto que cria o passo de aprovação manual.)
#
# NOTA (histórico de debugging): já tentámos --token via `firebase login:ci`
# em vez desta service account — falhou com "Your credentials are no longer
# valid" quase de imediato (esse mecanismo está deprecado e a Google tem vindo
# a restringi-lo). NÃO adicionar --debug ao comando de deploy neste workflow:
# o repositório é PÚBLICO, e --debug do firebase-tools pode imprimir a troca
# HTTP com a Google (incluindo bearer tokens derivados) no log da Action —
# um log público. Para diagnosticar uma falha de auth, reproduz LOCALMENTE:
#   GOOGLE_APPLICATION_CREDENTIALS=./serviceAccountkey.json \
#     npx firebase-tools@15 deploy --only firestore,functions \
#     --project lyvoo-9d54b --non-interactive --debug
# (com o mesmo ficheiro/conteúdo do secret FIREBASE_SERVICE_ACCOUNT) — a saída
# fica só no teu terminal, nunca num log público.
# Depois disto, qualquer push ao master que mexa em rules/functions valida e
# fica à espera da tua aprovação para ir a produção. Podes também correr à mão
# em Actions → "Firebase deploy" → Run workflow.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'functions/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/firebase-deploy.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'functions/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate (rules + functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: actions/setup-java@v4   # emulador do firebase-tools 15 exige JDK 21+
        with:
          distribution: temurin
          java-version: '21'
      - name: Install test deps (root)
        run: npm ci
      - name: Install function deps
        working-directory: functions
        run: npm ci
      - name: Syntax-check functions
        run: node --check functions/index.js
      - name: Lint (ESLint + Prettier)
        run: |
          npx eslint functions test
          npx prettier --check functions test
      - name: Validate firestore.indexes.json
        run: node -e "JSON.parse(require('fs').readFileSync('firestore.indexes.json','utf8')); console.log('indexes JSON ok')"
      - name: Test Firestore rules (emulator)   # compila E testa o modelo de segurança
        run: npx -y firebase-tools@15 emulators:exec --only firestore --project demo-lyvoo "node --test test/firestore.rules.test.mjs"
      - name: Test Cloud Functions (emulators)   # webhook Stripe + cascata RGPD
        run: npx -y firebase-tools@15 emulators:exec --only firestore,auth --project demo-lyvoo "node --test functions/test/functions.test.js"

  deploy:
    name: Deploy to production
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production   # exige aprovação manual se tiver "Required reviewers"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Install function deps
        working-directory: functions
        run: npm ci
      # Histórico de auth deste job (ambas as tentativas anteriores falharam):
      #   1. google-github-actions/auth + FIREBASE_SERVICE_ACCOUNT (GOOGLE_APPLICATION_
      #      CREDENTIALS) → "Failed to authenticate, have you run firebase login?"
      #      mesmo com o passo de auth verde (testado com firebase-tools@15 flutuante
      #      E fixado em 15.22.1 — mesmo erro nos dois).
      #   2. --token via `firebase login:ci` (FIREBASE_TOKEN) → "Your credentials are
      #      no longer valid" quase de imediato após gerar o token — este método está
      #      OFICIALMENTE deprecado (a própria CLI avisa disso) e a Google tem vindo a
      #      restringir o fluxo OAuth "out-of-band" em que assenta.
      # A documentação oficial atual recomenda service-account + GOOGLE_APPLICATION_
      # CREDENTIALS (voltámos a essa via aqui) — a mensagem genérica de erro da (1)
      # não diz a causa real (pode ser IAM insuficiente na SA, não necessariamente o
      # bug do issue #10716). Se voltar a falhar, diagnosticar com --debug LOCALMENTE
      # (ver nota no topo do ficheiro) — nunca neste workflow, que é público.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Sem --force: um deploy normal (sem remoções) passa em modo não-interativo;
      # uma operação destrutiva (apagar função/índice) FALHA em vez de a executar
      # às cegas — força tratamento humano.
      - name: Deploy rules, indexes and functions
        run: npx -y firebase-tools@15 deploy --only firestore,functions --project lyvoo-9d54b --non-interactive
