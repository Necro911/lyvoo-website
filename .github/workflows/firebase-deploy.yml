name: Firebase deploy

# CI/CD das Firestore rules/indexes + Cloud Functions. (B2)
#
# Estratégia: VALIDA em cada push/PR (sem segredos); só faz DEPLOY para produção
# depois de aprovação manual (GitHub Environment "production"). O frontend (HTML)
# é servido pelo GitHub Pages e NÃO é tocado por este workflow.
#
# ─── Setup necessário (uma vez), do lado do repositório/GCP ───────────────────
# 1. Service account de CI (least privilege) com os papéis para deploy:
#      - Firebase Rules Admin            (roles/firebaserules.admin)
#      - Cloud Datastore Index Admin     (roles/datastore.indexAdmin)
#      - Cloud Functions Admin           (roles/cloudfunctions.admin)
#      - Service Account User            (roles/iam.serviceAccountUser)
#      - Cloud Build Editor              (roles/cloudbuild.builds.editor)
#      - Artifact Registry Writer        (roles/artifactregistry.writer)
#      - Secret Manager Secret Accessor  (roles/secretmanager.secretAccessor)
#    Gera uma chave JSON dessa SA.
# 2. GitHub → Settings → Secrets and variables → Actions → New secret:
#      FIREBASE_SERVICE_ACCOUNT = (conteúdo do JSON da SA)
# 2b. firebase-tools tem um bug conhecido em CI onde não apanha as credenciais
#     ADC do passo "Authenticate to Google Cloud" acima (issue #10716) — por isso
#     o deploy real usa --token, não a SA JSON. Gerar uma vez, localmente:
#       npx firebase-tools login:ci
#     (abre o browser; autenticar com a conta Google dona do projeto lyvoo-9d54b)
#     e guardar o token impresso em GitHub → Secrets → Actions → New secret:
#       FIREBASE_TOKEN = (o token impresso)
# 3. GitHub → Settings → Environments → New environment "production" →
#    "Required reviewers" = tu. (É isto que cria o passo de aprovação manual.)
# Depois disto, qualquer push ao master que mexa em rules/functions valida e
# fica à espera da tua aprovação para ir a produção. Podes também correr à mão
# em Actions → "Firebase deploy" → Run workflow.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'functions/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/firebase-deploy.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'functions/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate (rules + functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - uses: actions/setup-java@v4   # emulador do firebase-tools 15 exige JDK 21+
        with:
          distribution: temurin
          java-version: '21'
      - name: Install test deps (root)
        run: npm ci
      - name: Install function deps
        working-directory: functions
        run: npm ci
      - name: Syntax-check functions
        run: node --check functions/index.js
      - name: Lint (ESLint + Prettier)
        run: |
          npx eslint functions test
          npx prettier --check functions test
      - name: Validate firestore.indexes.json
        run: node -e "JSON.parse(require('fs').readFileSync('firestore.indexes.json','utf8')); console.log('indexes JSON ok')"
      - name: Test Firestore rules (emulator)   # compila E testa o modelo de segurança
        run: npx -y firebase-tools@15 emulators:exec --only firestore --project demo-lyvoo "node --test test/firestore.rules.test.mjs"
      - name: Test Cloud Functions (emulators)   # webhook Stripe + cascata RGPD
        run: npx -y firebase-tools@15 emulators:exec --only firestore,auth --project demo-lyvoo "node --test functions/test/functions.test.js"

  deploy:
    name: Deploy to production
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production   # exige aprovação manual se tiver "Required reviewers"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Install function deps
        working-directory: functions
        run: npm ci
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Sem --force: um deploy normal (sem remoções) passa em modo não-interativo;
      # uma operação destrutiva (apagar função/índice) FALHA em vez de a executar
      # às cegas — força tratamento humano.
      #
      # --token em vez de depender só da autenticação ADC (google-github-actions/auth):
      # confirmámos em produção que firebase-tools falha com "Failed to authenticate,
      # have you run firebase login?" mesmo com credenciais ADC válidas (tentado com
      # firebase-tools@15 flutuante E fixado em 15.22.1 — mesmo erro nos dois).
      # https://github.com/firebase/firebase-tools/issues/10716
      # O --token usa o mecanismo de autenticação CI dedicado e documentado da própria
      # Firebase (gerado uma vez, localmente, com `npx firebase-tools login:ci`),
      # que não depende da deteção de GOOGLE_APPLICATION_CREDENTIALS pelo firebase-tools
      # — contorna este bug por completo. Guardado em Secrets → FIREBASE_TOKEN.
      # O passo "Authenticate to Google Cloud" acima fica por segurança/futuro uso
      # (ex. se algum dia precisarmos de gcloud direto), mas já não é o que autentica
      # este deploy.
      - name: Deploy rules, indexes and functions
        run: npx -y firebase-tools@15 deploy --only firestore,functions --project lyvoo-9d54b --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
