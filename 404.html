<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Lyvoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0B525A; --teal-light: #0D7A87; --cyan: #3DD9E8;
      --violet: #8B5CF6; --dark-bg: #080C0E; --ink-3: #7A8F96;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, #030D10 0%, #060F16 60%, #04080E 100%);
      min-height: 100vh; color: #fff;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(6,12,14,0.7); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; max-width: 1140px; margin: 0 auto; padding: 0 24px;
    }

    /* PAGE */
    .page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 60px; text-align: center;
    }
    .inner { max-width: 520px; }

    /* 404 number */
    .four-o-four {
      font-size: clamp(96px, 20vw, 180px);
      font-weight: 900; letter-spacing: -0.06em; line-height: 1;
      background: linear-gradient(135deg, #3DD9E8 0%, #8B5CF6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      user-select: none;
    }

    h1 {
      font-size: clamp(20px, 3vw, 28px); font-weight: 700;
      letter-spacing: -0.03em; color: #fff;
      margin-bottom: 14px;
    }
    p {
      font-size: 16px; color: rgba(255,255,255,0.45);
      line-height: 1.7; margin-bottom: 36px;
    }

    .btn-group { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--teal); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
      padding: 13px 26px; border-radius: 999px; text-decoration: none;
      border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.6);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      padding: 12px 24px; border-radius: 999px; text-decoration: none;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

    /* Floating orb decoration */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0; opacity: 0.18;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--cyan); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--violet); bottom: -80px; left: -80px; }

    .page { position: relative; z-index: 1; }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" style="text-decoration:none;">
      <img src="images/logo.png" alt="Lyvoo" style="height:46px;width:auto;display:block;" />
    </a>
  </div>
</nav>

<div class="page">
  <div class="inner">
    <div class="four-o-four">404</div>
    <h1>Esta página não existe</h1>
    <p>O link que seguiu pode estar desatualizado ou a página foi removida. Não se preocupe — a sua saúde está em boas mãos.</p>
    <div class="btn-group">
      <a href="index.html" class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Voltar ao início
      </a>
      <a href="planos.html" class="btn-ghost">
        Ver planos
      </a>
    </div>
  </div>
</div>

</body>
</html>
